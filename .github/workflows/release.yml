name: Release

# Build + publish installers when a version tag is pushed (e.g. v0.1.0), or on
# manual dispatch. Native modules (better-sqlite3, @powersync/node) compile on
# the matching OS runner — that's why the Windows installer is built here, not
# cross-compiled from macOS.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# electron-builder creates a GitHub Release for the tag.
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: release:win
          - os: macos-latest
            script: package:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # postinstall runs electron-rebuild for better-sqlite3 on this OS.
      - run: npm ci

      - name: Build + package (+ publish on Windows)
        run: npm run ${{ matrix.script }}
        env:
          # electron-builder publishes to GitHub Releases for the tag.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # macOS dmg as a CI artifact (not published — Windows is the release target).
      - if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: byos-desktop-mac
          path: dist/*.dmg
