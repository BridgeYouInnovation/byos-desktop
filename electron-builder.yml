appId: cm.bridgeyou.byos.desktop
productName: BYOS
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
# Ship unpacked (no asar). @powersync/node loads its native extension via a raw
# path (path.resolve(__dirname, '../lib/...')) in a worker thread, which can't be
# dlopen'd from inside an asar archive. Disabling asar keeps every file a real
# path so better-sqlite3 (.node) and the powersync extension (.dll/.dylib/.so)
# load correctly. Worth the slightly larger install for a native-heavy app.
asar: false
npmRebuild: true

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

mac:
  target:
    - dmg
  category: public.app-category.business
  # Unsigned local builds: skip notarization. Configure signing for distribution.
  identity: null

# Auto-update publishes to GitHub Releases (set GH_TOKEN in CI). The desktop repo
# must be pushed to github.com/BridgeYouInnovation/byos-desktop for this to work.
publish:
  provider: github
  owner: BridgeYouInnovation
  repo: byos-desktop
